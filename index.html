<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OceanGuard — India Coastal Monitor</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
:root {
  --ocean-deep:#060d1a;
  --panel:#0d1b30;
  --border:rgba(255,255,255,0.07);
  --cyan:#00c8b4;
  --amber:#f0a500;
  --red:#f04060;
  --green:#00d98b;
  --text-primary:#e8f0fa;
  --text-muted:#7a95b8;
  --font-display:'Syne',sans-serif;
  --font-mono:'DM Mono',monospace;
}

body{
  font-family:var(--font-display);
  background:var(--ocean-deep);
  color:var(--text-primary);
  margin:0;
}

main{max-width:1200px;margin:auto;padding:2rem}

.panel-card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  margin-bottom:1.5rem;
}

.panel-header{padding:1rem;border-bottom:1px solid var(--border)}

.section-title{
  font-size:12px;
  text-transform:uppercase;
  color:var(--text-muted);
}

table{width:100%;border-collapse:collapse}
td,th{padding:.7rem;font-family:var(--font-mono)}

.score-bar{height:6px;background:#111;border-radius:6px}
.score-fill{height:100%}

#map{height:350px;border-radius:12px}

#loading{text-align:center;padding:3rem}
#error-msg{display:none;color:red;text-align:center}
</style>
</head>

<body>

<header style="padding:1rem 2rem;border-bottom:1px solid var(--border)">
  <b>OceanGuard — Coastal Monitor</b>
  <span id="last-updated" style="float:right">Connecting...</span>
</header>

<main>

<div id="loading">Loading coastal data...</div>
<div id="error-msg">Error loading data</div>

<div id="dashboard" style="display:none">

<!-- MAP -->
<div class="panel-card">
  <div class="panel-header">
    <div class="section-title">Coastal Risk Map</div>
  </div>
  <div id="map"></div>
</div>

<!-- TABLE -->
<div class="panel-card">
  <div class="panel-header">
    <div class="section-title">City Status</div>
  </div>
  <table>
    <thead>
      <tr>
        <th>City</th>
        <th>Wind</th>
        <th>Temp</th>
        <th>Rain</th>
        <th>Risk</th>
        <th>Score</th>
        <th>Trend</th>
      </tr>
    </thead>
    <tbody id="city-table"></tbody>
  </table>
</div>

</div>
</main>

<script>
const SHEET_ID="1LHddh6bg9M0hskAypVRr_iF5h4SLzM1yw1vuFetn51s";
const API_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

const CITY_COORDS={
Mumbai:[19.0760,72.8777],
Goa:[15.4909,73.8278],
Mangalore:[12.9141,74.8560],
Kochi:[9.9312,76.2673],
Thiruvananthapuram:[8.5241,76.9366],
Chennai:[13.0827,80.2707],
Pondicherry:[11.9416,79.8083],
Visakhapatnam:[17.6868,83.2185],
Kolkata:[22.5726,88.3639]
};

function predictRisk(history,current){
if(!history||history.length<3)return current;
const last=history.slice(-3);
const trend=last[last.length-1].wind-last[0].wind;

if(trend>5){
if(current==="WATCH")return"WARNING";
if(current==="WARNING")return"EMERGENCY";
}
if(trend<-5){
if(current==="EMERGENCY")return"WARNING";
if(current==="WARNING")return"WATCH";
}
return current;
}

async function loadData(){
try{
const res=await fetch(API_URL);
const text=await res.text();
const json=JSON.parse(text.match(/setResponse\(([\s\S]*?)\)/)[1]);
const rows=json.table.rows;

const cityMap={},historyMap={};

rows.forEach(r=>{
const c=r.c;
if(!c||!c[1]?.v)return;

const city=c[1].v;
const wind=parseFloat(c[2]?.v)||0;
const temp=parseFloat(c[3]?.v)||0;
const rain=parseFloat(c[4]?.v)||0;
const risk=(c[5]?.v||"NORMAL").toUpperCase();

if(!historyMap[city])historyMap[city]=[];
historyMap[city].push({wind});

const riskScore=Math.min(100,
wind*2 + rain*3 +
(risk==="WATCH"?20:risk==="WARNING"?40:risk==="EMERGENCY"?60:0)
);

cityMap[city]={city,wind,temp,rain,risk,riskScore};
});

const cities=Object.values(cityMap);

cities.forEach(c=>{
c.predicted=predictRisk(historyMap[c.city],c.risk);
});

// TABLE
document.getElementById("city-table").innerHTML=cities.map(c=>`
<tr>
<td>${c.city}</td>
<td>${c.wind.toFixed(1)}</td>
<td>${c.temp.toFixed(1)}</td>
<td>${c.rain}</td>
<td>${c.risk}</td>
<td>
<div class="score-bar">
<div class="score-fill" style="width:${c.riskScore}%;
background:${c.riskScore>70?'#f04060':c.riskScore>40?'#f0a500':'#00d98b'}"></div>
</div>
</td>
<td>${c.predicted}</td>
</tr>
`).join("");

// MAP
if(!window.map){
window.map=L.map('map').setView([15,80],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(window.map);
}

if(window.markers)window.markers.forEach(m=>m.remove());
window.markers=[];

cities.forEach(c=>{
const coords=CITY_COORDS[c.city];
if(!coords)return;

const color=
c.risk==="EMERGENCY"?"#f04060":
c.risk==="WARNING"?"#f0a500":
c.risk==="WATCH"?"#00c8b4":"#00d98b";

const marker=L.circleMarker(coords,{
radius:8,color,fillColor:color,fillOpacity:0.8
}).addTo(window.map)
.bindPopup(`<b>${c.city}</b><br>Risk: ${c.risk}<br>Predicted: ${c.predicted}`);

window.markers.push(marker);
});

document.getElementById("dashboard").style.display="block";
document.getElementById("loading").style.display="none";

}catch(e){
console.error(e);
document.getElementById("error-msg").style.display="block";
}
}

loadData();
setInterval(loadData,60000);
</script>

</body>
</html>
